<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMEHUB - Player</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: sans-serif;
        }
        #screen-area {
            background-color: #000;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #display {
            background-color: white;
            zoom: 1;
            image-rendering: pixelated;
        }
        #display:focus {
            outline: none;
        }
        #loading {
            font-size: 2em;
            color: #00ff88;
            font-family: 'Courier New', monospace;
        }
        .keypad-part {
            background-color: #222;
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        .key-grid {
            display: grid;
            gap: 6px;
            width: 100%;
            height: 100%;
        }
        .left-grid {
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(4, 1fr);
        }
        .right-grid {
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }
        .key {
            background-color: #3a3a3a;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 5px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            user-select: none;
            transition: background-color 0.1s ease, transform 0.05s ease;
            line-height: 1.1;
        }
        .key span {
            font-size: 0.4em;
            font-weight: normal;
            margin-top: 2px;
            color: #aaa;
        }
        .key.active {
            background-color: #6a6a6a;
            transform: scale(0.95);
        }
        .arrow-key {
            font-size: 2em;
        }
        .ok-key {
            font-size: 1.3em;
        }
        .small-key {
            width: 70%;
            height: 70%;
            font-size: 0.9em;
            align-self: end;
            padding: 2px;
            line-height: 1;
        }
        .small-key-left {
            justify-self: left;
        }
        .small-key-right {
            justify-self: right;
        }
        #left-keys,
        #right-keys {
            display: none;
            position: absolute;
            bottom: 0;
        }
        #left-keys {
            left: 0;
        }
        #right-keys {
            right: 0;
        }
        
        /* Show keyboard only on mobile */
        body.mobile-active.kbd-portrait #left-keys,
        body.mobile-active.kbd-portrait #right-keys {
            display: flex;
        }
        
        body.kbd-portrait #left-keys,
        body.kbd-portrait #right-keys {
            width: 50%;
            height: 220px;
        }
        body.kbd-landscape #left-keys,
        body.kbd-landscape #right-keys {
            width: 220px;
            height: 100%;
        }
        body.kbd-landscape #left-keys .key-grid,
        body.kbd-landscape #right-keys .key-grid {
            max-height: 400px;
        }
        body.kbd-portrait #screen-area {
            bottom: 0;
        }
        body.kbd-landscape #screen-area {
            left: 220px;
            right: 220px;
        }
        
        /* Mobile portrait layout */
        body.mobile-active.kbd-portrait #screen-area {
            bottom: 220px;
        }
        body.mobile-active.kbd-portrait #left-keys,
        body.mobile-active.kbd-portrait #right-keys {
            width: 50%;
            height: 220px;
        }
    </style>
</head>
<body>
    <div id="screen-area">
        <canvas tabindex="0" id="display" style="display: none;"></canvas>
        <div id="loading">Carregando GAMEHUB...</div>
    </div>
    <div id="left-keys" class="keypad-part">
        <div class="key-grid left-grid">
            <button data-key="Digit1" class="key">1</button>
            <button data-key="Digit2" class="key">2 <span>ABC</span></button>
            <button data-key="Digit3" class="key">3 <span>DEF</span></button>
            <button data-key="Digit4" class="key">4 <span>GHI</span></button>
            <button data-key="Digit5" class="key">5 <span>JKL</span></button>
            <button data-key="Digit6" class="key">6 <span>MNO</span></button>
            <button data-key="Digit7" class="key">7 <span>PQRS</span></button>
            <button data-key="Digit8" class="key">8 <span>TUV</span></button>
            <button data-key="Digit9" class="key">9 <span>WXYZ</span></button>
            <button data-key="NumpadAsterisk" class="key">*</button>
            <button data-key="Digit0" class="key">0 <span>+</span></button>
            <button data-key="NumpadDivide" class="key">#</button>
        </div>
    </div>
    <div id="right-keys" class="keypad-part">
         <div class="key-grid right-grid">
            <button data-key="F1" class="key">L</button>
            <button data-key="ArrowUp" class="key arrow-key" aria-label="Up">↑</button>
            <button data-key="F2" class="key">R</button>
            <button data-key="ArrowLeft" class="key arrow-key" aria-label="Left">←</button>
            <button data-key="Enter" class="key ok-key">OK</button>
            <button data-key="ArrowRight" class="key arrow-key" aria-label="Right">→</button>
            <button data-key="Escape" class="key small-key small-key-left">Esc</button>
            <button data-key="ArrowDown" class="key arrow-key" aria-label="Down">↓</button>
            <button data-key="Maximize" class="key small-key small-key-right" aria-label="Maximize">⛶</button>
        </div>
    </div>
    <script src="https://cjrtnc.leaningtech.com/20260317_2978/loader.js"></script>
    <script type="module">
        import { LibMedia } from "./emulator/web/libmedia/libmedia.js";
        import { LibMidi, createUnlockingAudioContext } from "./emulator/web/libmidi/libmidi.js";
        import { codeMap, KeyRepeatManager } from "./emulator/web/src/key.js";
        import { EventQueue } from "./emulator/web/src/eventqueue.js";
        import { initKbdListeners, setKbdHandler, kbdWidth, kbdHeight } from "./emulator/web/src/screenKbd.js";

        import canvasFontNatives from "./emulator/web/libjs/libcanvasfont.js";
        import canvasGraphicsNatives from "./emulator/web/libjs/libcanvasgraphics.js";
        import gles2Natives from "./emulator/web/libjs/libgles2.js";
        import jsReferenceNatives from "./emulator/web/libjs/libjsreference.js";
        import mediaBridgeNatives from "./emulator/web/libjs/libmediabridge.js";
        import midiBridgeNatives from "./emulator/web/libjs/libmidibridge.js";

        const evtQueue = new EventQueue();
        const sp = new URLSearchParams(location.search);

        const cheerpjWebRoot = '/app'+location.pathname.replace(/\/[^/]*$/,'');

        let isMobile = sp.get('mobile');
        
        // Auto-detect mobile devices
        if (!isMobile && /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            isMobile = '1';
        }

        let display = null;
        let screenCtx = null;

        let fractionScale = sp.get('fractionScale') || (localStorage && localStorage.getItem("pl.zb3.freej2me.fractionScale") === "true");
        let scaleSet = false;

        // Force portrait mode to avoid game orientation errors
        let forcePortrait = true;

        const keyRepeatManager = new KeyRepeatManager();

        window.evtQueue = evtQueue;

        function autoscale() {
            if (!scaleSet) return;

            let screenWidth = window.innerWidth;
            let screenHeight = window.innerHeight;

            // Always force portrait mode for the emulator
            if (isMobile) {
                document.getElementById('left-keys').style.display = '';
                document.getElementById('right-keys').style.display = '';

                // Force portrait mode regardless of actual screen orientation
                document.body.classList.add('kbd-portrait');
                document.body.classList.remove('kbd-landscape');
                screenHeight = screenHeight - kbdHeight;
            }

            // Swap dimensions to force portrait orientation
            let effectiveWidth = forcePortrait ? Math.min(screenWidth, screenHeight) : screenWidth;
            let effectiveHeight = forcePortrait ? Math.max(screenWidth, screenHeight) : screenHeight;

            let scale = Math.min(
                effectiveWidth/screenCtx.canvas.width,
                effectiveHeight/screenCtx.canvas.height
            );

            if (!fractionScale) {
                scale = scale|0;
            }

            display.style.zoom = scale;
        }

        function setListeners() {
            let mouseDown = false;
            let noMouse = false;

            setKbdHandler((isDown, key) => {
                const symbol = key.startsWith('Digit') ? key.substring(5) : '\x00';
                keyRepeatManager.post(isDown, key, {symbol, ctrlKey: false, shiftKey: false});
            });

            function handleKeyEvent(e) {
                const isDown = e.type === 'keydown';

                if (codeMap[e.code]) {
                    keyRepeatManager.post(isDown, e.code, {
                        symbol: e.key.length == 1 ? e.key.charCodeAt(0) : '\x00',
                        ctrlKey: e.ctrlKey,
                        shiftKey: e.shiftKey
                    })
                }
                e.preventDefault();
            }

            display.addEventListener('keydown', handleKeyEvent);
            display.addEventListener('keyup', handleKeyEvent);

            keyRepeatManager.register((kind, key, args) => {
                if (kind === 'click') {
                    if (key === 'Maximize') {
                        fractionScale = !fractionScale;
                        localStorage && localStorage.setItem("pl.zb3.freej2me.fractionScale", fractionScale);
                        autoscale();
                    }
                } else if (codeMap[key]) {
                    console.log('queuin event');
                    evtQueue.queueEvent({
                        kind: kind === 'up' ? 'keyup' : 'keydown',
                        args: [codeMap[key], args.symbol, args.ctrlKey, args.shiftKey]
                    });
                }
            });

            display.addEventListener('mousedown', async e => {
                display.focus();
                if (noMouse) return;

                let x = e.offsetX / display.currentCSSZoom | 0;
                let y = e.offsetY / display.currentCSSZoom | 0;

                evtQueue.queueEvent({
                    kind: 'pointerpressed',
                    x: x,
                    y: y,
                });

                mouseDown = true;

                e.preventDefault();
            });

            display.addEventListener('mousemove', async e => {
                if (noMouse) return;
                if (!mouseDown) return;

                let x = e.offsetX / display.currentCSSZoom | 0;
                let y = e.offsetY / display.currentCSSZoom | 0;

                evtQueue.queueEvent({
                    kind: 'pointerdragged',
                    x: x,
                    y: y,
                });

                e.preventDefault();
            });

            document.addEventListener('mouseup', async e => {
                if (noMouse) return;
                if (!mouseDown) return;

                mouseDown = false;

                let x = (e.pageX - display.offsetLeft) / display.currentCSSZoom | 0;
                let y = (e.pageY - display.offsetTop) / display.currentCSSZoom | 0;

                evtQueue.queueEvent({
                    kind: 'pointerreleased',
                    x: x,
                    y: y,
                });

                e.preventDefault();
            });


            display.addEventListener('touchstart', async e => {
                display.focus();
                noMouse = true;

                let x = (e.changedTouches[0].pageX - display.offsetLeft) / display.currentCSSZoom | 0;
                let y = (e.changedTouches[0].pageY - display.offsetTop) / display.currentCSSZoom | 0;

                evtQueue.queueEvent({
                    kind: 'pointerpressed',
                    x: x,
                    y: y,
                });

                e.preventDefault();
            }, {passive: false});

            display.addEventListener('touchmove', async e => {
                noMouse = true;

                let x = (e.changedTouches[0].pageX - display.offsetLeft) / display.currentCSSZoom | 0;
                let y = (e.changedTouches[0].pageY - display.offsetTop) / display.currentCSSZoom | 0;

                evtQueue.queueEvent({
                    kind: 'pointerdragged',
                    x: x,
                    y: y,
                });

                e.preventDefault();
            }, {passive: false});

            display.addEventListener('touchend', async e => {
                noMouse = true;

                let x = (e.changedTouches[0].pageX - display.offsetLeft) / display.currentCSSZoom | 0;
                let y = (e.changedTouches[0].pageY - display.offsetTop) / display.currentCSSZoom | 0;

                evtQueue.queueEvent({
                    kind: 'pointerreleased',
                    x: x,
                    y: y,
                });

                e.preventDefault();
            });

            document.addEventListener('mousedown', e => {
                console.log('refocus');
                setTimeout(() => display.focus(), 20);
                ;
            });

            display.addEventListener('blur', e => {
                console.log('refocus');
                setTimeout(() => display.focus(), 10);
                ;
            });

            window.addEventListener('resize', autoscale);

            initKbdListeners();
        }

        function setFaviconFromBuffer(arrayBuffer) {
            const blob = new Blob([arrayBuffer], { type: 'image/png' });

            const reader = new FileReader();
            reader.onload = function() {
                const dataURL = reader.result;

                let link = document.querySelector("link[rel*='icon']");
                if (!link) {
                    link = document.createElement('link');
                    link.setAttribute('rel', 'icon');
                    document.head.appendChild(link);
                }
                link.setAttribute('href', dataURL);
            };
            reader.readAsDataURL(blob);
        }

        async function ensureAppInstalled(lib, appId) {
            const appFile = await cjFileBlob(appId + "/app.jar");

            if (!appFile) {
                const launcherUtil = await lib.pl.zb3.freej2me.launcher.LauncherUtil;

                await launcherUtil.installFromBundle(cheerpjWebRoot + "/apps/", appId);
            }
        }

        async function init() {
            document.getElementById("loading").textContent = "Loading CheerpJ...";

            // Add mobile class if on mobile device
            if (isMobile) {
                document.body.classList.add('mobile-active');
            }

            display = document.getElementById('display');
            screenCtx = display.getContext('2d');

            setListeners();

            window.libmidi = new LibMidi(createUnlockingAudioContext());
            await window.libmidi.init();
            window.libmidi.midiPlayer.addEventListener('end-of-media', e => {
                window.evtQueue.queueEvent({kind: 'player-eom', player: e.target});
            })
            window.libmedia = new LibMedia();

            await cheerpjInit({
                enableDebug: false,
                natives: {
                    ...canvasFontNatives,
                    ...canvasGraphicsNatives,
                    ...gles2Natives,
                    ...jsReferenceNatives,
                    ...mediaBridgeNatives,
                    ...midiBridgeNatives,
                    async Java_pl_zb3_freej2me_bridge_shell_Shell_setTitle(lib, title) {
                        document.title = title;
                    },
                    async Java_pl_zb3_freej2me_bridge_shell_Shell_setIcon(lib, iconBytes) {
                        if (iconBytes) {
                            setFaviconFromBuffer(iconBytes.buffer);
                        }
                    },
                    async Java_pl_zb3_freej2me_bridge_shell_Shell_getScreenCtx(lib) {
                        return screenCtx;
                    },
                    async Java_pl_zb3_freej2me_bridge_shell_Shell_setCanvasSize(lib, width, height) {
                        if (!scaleSet) {
                            document.getElementById('loading').hidden = true;
                            display.style.display = '';
                            scaleSet = true;
                            display.focus();
                        }
                        
                        // Force portrait mode by swapping dimensions if game requests landscape
                        if (forcePortrait && width > height) {
                            // Game wants landscape (e.g., 320x240), we swap to portrait (240x320)
                            screenCtx.canvas.width = height;
                            screenCtx.canvas.height = width;
                            display.style.transform = '';
                        } else {
                            screenCtx.canvas.width = width;
                            screenCtx.canvas.height = height;
                            display.style.transform = '';
                        }
                        
                        autoscale();
                    },
                    async Java_pl_zb3_freej2me_bridge_shell_Shell_waitForAndDispatchEvents(lib, listener) {
                        const KeyEvent = await lib.pl.zb3.freej2me.bridge.shell.KeyEvent;
                        const PointerEvent = await lib.pl.zb3.freej2me.bridge.shell.PointerEvent;

                        const evt = await evtQueue.waitForEvent();
                        if (evt.kind == 'keydown') {
                            await listener.keyPressed(await new KeyEvent(...evt.args));
                        } else if (evt.kind == 'keyup') {
                            await listener.keyReleased(await new KeyEvent(...evt.args));
                        } else if (evt.kind == 'pointerpressed') {
                            await listener.pointerPressed(await new PointerEvent(evt.x, evt.y));
                        } else if (evt.kind == 'pointerdragged') {
                            await listener.pointerDragged(await new PointerEvent(evt.x, evt.y));
                        } else if (evt.kind == 'pointerreleased') {
                            await listener.pointerReleased(await new PointerEvent(evt.x, evt.y));
                        } else if (evt.kind == 'player-eom') {
                            await listener.playerEOM(evt.player);
                        } else if (evt.kind == 'player-video-frame') {
                            await listener.playerVideoFrame(evt.player);
                        }
                    },
                    async Java_pl_zb3_freej2me_bridge_shell_Shell_restart(lib) {
                        location.reload();
                    },
                    async Java_pl_zb3_freej2me_bridge_shell_Shell_exit(lib) {
                        location.href = './';
                    },
                    async Java_pl_zb3_freej2me_bridge_shell_Shell_sthop(lib) {
                        debugger;
                    },
                    async Java_pl_zb3_freej2me_bridge_shell_Shell_say(lib, sth) {
                        console.log('[say]', sth);
                    },
                    async Java_pl_zb3_freej2me_bridge_shell_Shell_sayObject(lib, label, obj) {
                        debugger;
                        console.log('[sayobject]', label, obj);
                    }
                }
            });

            document.getElementById("loading").textContent = "Loading...";

            const lib = await cheerpjRunLibrary(cheerpjWebRoot+"/emulator/web/freej2me-web.jar");

            const FreeJ2ME = await lib.org.recompile.freej2me.FreeJ2ME;

            let args;

            if (sp.get('app')) {
                const app = sp.get('app');
                await ensureAppInstalled(lib, app);

                args = ['app', sp.get('app')];
            } else {
                // Custom path for JAR files from games/ folder
                const jarName = sp.get('jar') || "game.jar";
                args = ['jar', cheerpjWebRoot + "/games/" + jarName];
            }

            FreeJ2ME.main(args).catch(e => {
                e.printStackTrace();
                document.getElementById('loading').textContent = 'Crash :(';
            });
        }

        init();
    </script>
</body>
</html>
