    <script type="text/javascript">
      (function () {
        function GameLoader() {
          this.init = function () {
            this._gameId = "6e9fca49c39246a484f533b946210ea7";
            this._container = document.getElementById("game");

            // --- FIX: IMPEDE QUE O SDK ALTERE A URL (SITE LOCK REMOVIDO) ---
            // O iframe já possui a URL correta e fixa. Marcamos como inicializado
            // para que qualquer tentativa de load seja ignorada.
            this._container_initialized = true;

            this._loader = this._getLoaderData();
            this._hasImpression = false;
            this._hasSuccess = false;
            this._insertGameSDK();
            this._softgamesDomains = this._getDomainData();

            // Garante que o iframe receba foco ao carregar
            this._container.onload = this._onFrameLoaded.bind(this);
          };

          this._getLoaderData = function () {
            return { enabled: true, sdk_version: "1.15.2", _: 55 };
          };

          this._getDomainData = function () {
            return [
              { name: "minigame.aeriagames.jp", id: 4217 },
              { name: "localhost:8080", id: 4217 },
              { name: "minigame-stg.aeriagames.jp", id: 4217 },
            ];
          };

          this._insertGameSDK = function () {
            if (!this._gameId) return;
            window["GD_OPTIONS"] = {
              gameId: this._gameId,
              loader: this._loader,
              onLoaderEvent: this._onLoaderEvent.bind(this),
              onEvent: this._onEvent.bind(this),
            };
            (function (d, s, id) {
              var js,
                fjs = d.getElementsByTagName(s)[0];
              if (d.getElementById(id)) return;
              js = d.createElement(s);
              js.id = id;
              js.src = "https://html5.api.gamedistribution.com/main.min.js";
              fjs.parentNode.insertBefore(js, fjs);
            })(document, "script", "gamedistribution-jssdk");
          };

          // Função _loadGame mantida apenas para compatibilidade, mas nunca será executada
          // porque this._container_initialized = true
          this._loadGame = function (options) {
            if (this._container_initialized) return;
            // Nada é alterado – a URL permanece a definida no HTML
          };

          this._onLoaderEvent = function (event) {
            switch (event.name) {
              case "LOADER_DATA":
                this._bridge = event.message.bridge;
                this._game = event.message.game;
                break;
            }
          };

          this._onEvent = function (event) {
            switch (event.name) {
              case "SDK_GAME_START":
                // A chamada abaixo não fará nada devido ao _container_initialized = true
                this._bridge && this._loadGame({ hasImpression: this._hasImpression });
                break;
              case "AD_ERROR":
              case "AD_SDK_CANCELED":
                this._hasImpression = false || this._hasSuccess;
                break;
              case "ALL_ADS_COMPLETED":
              case "COMPLETE":
              case "USER_CLOSE":
              case "SKIPPED":
                this._hasImpression = true;
                this._hasSuccess = true;
                break;
            }
          };

          this._onFrameLoaded = function (event) {
            var container = this._container;
            setTimeout(function () {
              try {
                container.contentWindow.focus();
              } catch (err) {}
            }, 100);
          };
        }
        new GameLoader().init();
      })();
    </script>
