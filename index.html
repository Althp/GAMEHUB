<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Game Hub Oficial</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Background Effects -->
    <div class="ambient-light"></div>
    <div class="grid-pattern"></div>

    <header class="glass-header">
      <div class="header-content">
        <div class="logo">
          <i class="fas fa-gamepad"></i>
          <span>GameHub</span>
        </div>
        <div class="search-container">
          <div class="search-box glass">
            <i class="fas fa-search search-icon"></i>
            <input
              type="text"
              id="searchBar"
              placeholder="Buscar jogos..."
              autocomplete="off"
            />
            <button class="clear-btn" id="clearBtn" style="display: none">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="main-container">
      <!-- Daily Recommendations -->
      <section class="rec-section" id="dailyRecContainer" style="display: none">
        <div class="section-header">
          <h2 class="section-title">
            <span class="title-icon">🔥</span>
            <span>Em Alta</span>
          </h2>
          <div class="section-line"></div>
        </div>
        <div class="rec-carousel" id="recGrid"></div>
      </section>

      <!-- Main Grid -->
      <section class="games-section">
        <div class="section-header">
          <h2 class="section-title">
            <span class="title-icon">🎮</span>
            <span>Biblioteca</span>
          </h2>
          <div class="filter-tabs">
            <button class="tab active" data-filter="all">Todos</button>
            <button class="tab" data-filter="n64">N64</button>
            <button class="tab" data-filter="megadrive">Mega Drive</button>
            <button class="tab" data-filter="html">HTML5</button>
          </div>
        </div>

        <div class="app-grid" id="gameContainer"></div>
      </section>

      <!-- Empty State -->
      <div id="noResults" class="no-results" style="display: none">
        <div class="ghost-animation">
          <i class="fas fa-ghost"></i>
        </div>
        <h3>Nenhum jogo encontrado</h3>
        <p>Tente buscar com outro termo</p>
      </div>
    </main>

    <!-- Game Modal -->
    <div id="gameModal" class="game-modal">
      <div class="modal-backdrop"></div>
      <div class="modal-content glass-panel">
        <div class="modal-header">
          <div class="game-info">
            <div class="game-badge" id="modalGameBadge">N64</div>
            <h3 id="modalGameTitle">Nome do Jogo</h3>
          </div>
          <div class="modal-controls">
            <button class="control-btn" id="fullscreenBtn" title="Tela Cheia">
              <i class="fas fa-expand" id="fullscreenIcon"></i>
            </button>
            <button class="control-btn close-btn" id="closeBtn" title="Fechar">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
        <div class="modal-body">
          <div id="gameTarget" class="game-target"></div>
          <div class="game-overlay" id="gameOverlay">
            <div class="loading-spinner">
              <div class="spinner-ring"></div>
              <span>Carregando...</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
